extends: _base/normal.yaml

name: "QoS Downlink: VI vs BE"
description: |
  Demonstrates AP downlink QoS scheduling: one STA runs AC_VI (DSCP AF31),
  the other AC_BE (DSCP 0). Both are downlink (Mac → device).

  Expected result (AX4200, VHT80, 2 × RPi 500):
    rpi-sta-01 (BE):  ~40 Mbps
    rpi-sta-02 (VI): ~194 Mbps
  AP clearly prioritizes AC_VI downlink queue over AC_BE.

  See docs/methodology.md §QoS for full measurements and WMM EDCA analysis.
duration_sec: 60

preflight:
  expected_agents: ["rpi-sta-01", "rpi-sta-02"]

stations:
  - node: rpi-sta-01
    traffic:
      type: iperf3_tcp
      server: "atf-broker.local"
      direction: downlink
      ac: be

  - node: rpi-sta-02
    traffic:
      type: iperf3_tcp
      server: "atf-broker.local"
      direction: downlink
      ac: vi
